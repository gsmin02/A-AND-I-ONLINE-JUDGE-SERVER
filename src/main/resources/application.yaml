spring:
  application:
    name: online.judge
  main:
    web-application-type: reactive

  mongodb:
    uri: ${MONGODB_URI:mongodb://judge:judge123@mongodb:27017/online_judge?authSource=admin}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

logging:
  structured:
    format:
      console: logstash
  level:
    com.aandiclub.online.judge: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

judge:
  cors:
    api-allowed-origin-patterns: "${JUDGE_CORS_API_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://aandiclub.com,https://api.aandiclub.com,https://admin.aandiclub.com,https://online.judge.aandiclub.com}"
    api-allowed-methods: "${JUDGE_CORS_API_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}"
    allowed-headers: "${JUDGE_CORS_ALLOWED_HEADERS:*}"
    exposed-headers: "${JUDGE_CORS_EXPOSED_HEADERS:Location}"
    allow-credentials: ${JUDGE_CORS_ALLOW_CREDENTIALS:false}
    max-age-seconds: ${JUDGE_CORS_MAX_AGE_SECONDS:3600}
  openapi:
    server-url: ${APP_OPENAPI_SERVER_URL:}
  jwt-auth:
    enabled: ${JUDGE_JWT_AUTH_ENABLED:true}
    signing-key: ${JUDGE_JWT_AUTH_SIGNING_KEY:}
    required-role: ${JUDGE_JWT_AUTH_REQUIRED_ROLE:USER}
    allow-without-role-claim: ${JUDGE_JWT_AUTH_ALLOW_WITHOUT_ROLE_CLAIM:true}
  rate-limit:
    enabled: ${JUDGE_RATE_LIMIT_ENABLED:true}
    submit-requests: ${JUDGE_RATE_LIMIT_SUBMIT_REQUESTS:30}
    window-seconds: ${JUDGE_RATE_LIMIT_WINDOW_SECONDS:60}
  worker:
    max-concurrency: ${JUDGE_WORKER_MAX_CONCURRENCY:2}
  problem-events:
    enabled: ${JUDGE_PROBLEM_EVENTS_ENABLED:false}
    queue-url: ${JUDGE_PROBLEM_EVENTS_QUEUE_URL:}
    wait-time-seconds: ${JUDGE_PROBLEM_EVENTS_WAIT_TIME_SECONDS:20}
    max-messages: ${JUDGE_PROBLEM_EVENTS_MAX_MESSAGES:10}
  sandbox:
    time-limit-seconds: ${SANDBOX_TIME_LIMIT_SECONDS:2}
    memory-limit-mb: ${SANDBOX_MEMORY_LIMIT_MB:256}
    cpu-limit: ${SANDBOX_CPU_LIMIT:1.0}
    pids-limit: ${SANDBOX_PIDS_LIMIT:50}
    images:
      python: ${SANDBOX_IMAGE_PYTHON:judge-sandbox-python:latest}
      kotlin: ${SANDBOX_IMAGE_KOTLIN:judge-sandbox-kotlin:latest}
      dart: ${SANDBOX_IMAGE_DART:judge-sandbox-dart:latest}
  problems:
    items:
      quiz-101:
        test-cases:
          - case-id: 1
            args: [3, 5]
            expected-output: "8"
